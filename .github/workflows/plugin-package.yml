name: 🔌 Plugin | Package

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - '*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

#    # Install dependencies for translations
#    - name: Install Qt lrelease
#      run: |
#        sudo apt-get update
#        sudo apt-get install qtbase5-dev qttools5-dev-tools


    - name: Install qgis-plugin-ci
      run: pip3 install qgis-plugin-ci


#    # This allows updating new translations to the online translation platform transifex
#    - name: 🌍 Push translations
#      if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
#      run: qgis-plugin-ci push-translation ${{ secrets.TX_TOKEN }}


    # Package the plugin as a dev version each time there is a change in the main branch
    - name: Package a dev version
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      run: |
        VERSION=0.0.0
        qgis-plugin-ci package ${VERSION}
#        --transifex-token "${{ secrets.TX_TOKEN }}"
    - uses: actions/upload-artifact@v6
      if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
      with:
        name: nw_ow_locator_plugin_dev
        path: nw_ow_locator.0.0.0.zip


      # Package the plugin as a versioned release each time there is a tag in the main branch
    - name: Package a release version
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      run: |
        VERSION=${{ github.ref_name }}
        qgis-plugin-ci package ${VERSION}
#        --transifex-token "${{ secrets.TX_TOKEN }}"
    - uses: actions/upload-artifact@v6
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      with:
        name: nw_ow_locator_plugin_dev
        path: nw_ow_locator.${{ github.ref_name }}.zip


